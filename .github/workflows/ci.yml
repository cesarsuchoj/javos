name: CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests (JUnit + Coverage)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Run unit and integration tests with coverage
        working-directory: backend
        run: mvn verify --batch-mode --no-transfer-progress

      - name: Upload JaCoCo coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
          retention-days: 14

  frontend-tests:
    name: Frontend Tests (Vitest + Coverage)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run component tests with coverage
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload frontend coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage-${{ matrix.os }}
          path: frontend/coverage/
          retention-days: 14

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [backend-tests, frontend-tests]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend into backend static resources
        working-directory: frontend
        run: npm run build
        env:
          VITE_OUT_DIR: ../backend/src/main/resources/static

      - name: Build backend JAR (includes frontend)
        working-directory: backend
        run: mvn package -DskipTests --batch-mode --no-transfer-progress

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps

      - name: Start application
        working-directory: backend
        run: java -jar target/javos-*.jar &
        env:
          SPRING_DATASOURCE_URL: "jdbc:sqlite::memory:"
          SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.sqlite.JDBC
          SPRING_JPA_DATABASE_PLATFORM: org.hibernate.community.dialect.SQLiteDialect
          SPRING_FLYWAY_ENABLED: "false"
          JWT_SECRET: e2e-test-secret-for-ci-only

      - name: Wait for application to be ready
        run: |
          echo "Waiting for application to start on port 8080..."
          timeout 60 bash -c 'until curl -sf http://localhost:8080/ > /dev/null 2>&1; do sleep 2; done' \
            || { echo "Application did not start within 60 seconds"; exit 1; }

      - name: Run E2E tests
        working-directory: frontend
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright videos (failures only)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-videos
          path: frontend/test-results/
          retention-days: 7

  docker-build-push:
    name: Docker Build and Push
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [backend-tests, frontend-tests]
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ----------------------------------------------------------------
  # Deploy to Staging
  # Runs automatically on every push to main after tests and image
  # build pass. Uses the GitHub Environment "staging" which can be
  # configured with branch protection rules in repository settings.
  #
  # Required repository secrets (Settings → Environments → staging):
  #   STAGING_DEPLOY_HOST     – hostname or IP of the staging server
  #   STAGING_DEPLOY_USER     – SSH user on the staging server
  #   STAGING_DEPLOY_SSH_KEY  – private SSH key for staging server
  # ----------------------------------------------------------------
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
    needs: [docker-build-push]
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Deploy to staging server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.STAGING_DEPLOY_USER }}
          key: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/javos/deploy

            # Pull the new image built in docker-build-push
            docker pull ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }}

            # Update DOCKER_IMAGE in the staging env file
            sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }}|" .env.staging

            # Recreate only the backend (zero-downtime for nginx/prometheus/grafana)
            docker compose -f docker-compose.staging.yml --env-file .env.staging \
              up -d --no-deps --pull never backend

            echo "Waiting for backend health check..."
            timeout 90 bash -c \
              'until docker compose -f docker-compose.staging.yml --env-file .env.staging \
                exec -T backend wget -qO- http://localhost:8080/actuator/health \
                | grep -q "UP"; do sleep 5; done' \
              || { echo "Backend health check failed"; exit 1; }

      - name: Post-deploy health check (staging)
        run: |
          STAGING_URL="${{ vars.STAGING_URL }}"
          if [ -z "$STAGING_URL" ]; then
            echo "STAGING_URL not set — skipping external health check"
            exit 0
          fi
          echo "Checking $STAGING_URL/actuator/health ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "$STAGING_URL/actuator/health" \
              --max-time 10 --insecure 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "UP" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status='$STATUS', retrying in 15s..."
            sleep 15
          done
          echo "Post-deploy health check failed after 5 attempts"
          exit 1

  # ----------------------------------------------------------------
  # Deploy to Production
  # Runs on version tags (v*) or manual workflow_dispatch.
  # Uses the GitHub Environment "production" which SHOULD be
  # configured with at least one required reviewer in repository
  # settings (Settings → Environments → production → Required reviewers).
  #
  # Required repository secrets (Settings → Environments → production):
  #   PRODUCTION_DEPLOY_HOST    – hostname or IP of the production server
  #   PRODUCTION_DEPLOY_USER    – SSH user on the production server
  #   PRODUCTION_DEPLOY_SSH_KEY – private SSH key for production server
  # ----------------------------------------------------------------
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v')
    needs: [backend-tests, frontend-tests, docker-build-push]
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set image tag
        id: image
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Backup database before deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          username: ${{ secrets.PRODUCTION_DEPLOY_USER }}
          key: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/javos/deploy
            mkdir -p ~/javos/backups/pre-deploy
            ./backup.sh ~/javos/backups/pre-deploy
            echo "Pre-deploy backup created."

      - name: Deploy to production server via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.PRODUCTION_DEPLOY_HOST }}
          username: ${{ secrets.PRODUCTION_DEPLOY_USER }}
          key: ${{ secrets.PRODUCTION_DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/javos/deploy

            # Pull the new image
            docker pull ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }}

            # Store previous image tag for rollback reference
            PREV_TAG=$(grep "^DOCKER_IMAGE=" .env | cut -d= -f2- || echo "")
            echo "Previous image: $PREV_TAG"
            echo "New image: ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }}"

            # Update .env
            sed -i "s|^DOCKER_IMAGE=.*|DOCKER_IMAGE=ghcr.io/${{ github.repository }}:${{ steps.image.outputs.tag }}|" .env

            # Recreate only the backend (zero-downtime for nginx/prometheus/grafana)
            docker compose -f docker-compose.prod.yml up -d --no-deps --pull never backend

            echo "Waiting for backend health check (up to 120s)..."
            timeout 120 bash -c \
              'until docker compose -f docker-compose.prod.yml \
                exec -T backend wget -qO- http://localhost:8080/actuator/health \
                | grep -q "UP"; do sleep 5; done' \
              || { echo "Backend health check failed — consider rollback"; exit 1; }

      - name: Post-deploy health check (production)
        run: |
          PRODUCTION_URL="${{ vars.PRODUCTION_URL }}"
          if [ -z "$PRODUCTION_URL" ]; then
            echo "PRODUCTION_URL not set — skipping external health check"
            exit 0
          fi
          echo "Checking $PRODUCTION_URL/actuator/health ..."
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf "$PRODUCTION_URL/actuator/health" \
              --max-time 15 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
            if [ "$STATUS" = "UP" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: status='$STATUS', retrying in 20s..."
            sleep 20
          done
          echo "Post-deploy health check failed after 5 attempts"
          exit 1
