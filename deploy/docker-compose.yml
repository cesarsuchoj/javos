# ============================================================
# Javos - Docker Compose
# ============================================================
# Executa backend + frontend integrados em um único container.
#
# BANCO DE DADOS:
#   - Padrão: SQLite (sem configuração extra necessária)
#   - MySQL:  Edite o arquivo .env e reinicie a aplicação
#             (veja instruções em .env.example)
# ============================================================

version: '3.9'

services:
  # ---- Aplicação Javos (Backend + Frontend) ----
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: javos-app
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-javos-change-this-secret-in-production}
      # Banco de dados (configurado via .env)
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:sqlite:./data/javos.db}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.sqlite.JDBC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      SPRING_JPA_DATABASE_PLATFORM: ${SPRING_JPA_DATABASE_PLATFORM:-org.hibernate.community.dialect.SQLiteDialect}
    volumes:
      - javos-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    # depends_on:
    #   db:
    #     condition: service_healthy

  # ---- MySQL (descomente para usar MySQL em vez de SQLite) ----
  # Para ativar:
  #   1. Descomente o bloco 'db' abaixo
  #   2. Descomente o bloco 'depends_on' no serviço 'app' acima
  #   3. Descomente 'javos-mysql-data' em 'volumes' abaixo
  #   4. Configure as variáveis de banco no arquivo .env
  # db:
  #   image: mysql:8.0
  #   container_name: javos-db
  #   environment:
  #     MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
  #     MYSQL_DATABASE: javos
  #     MYSQL_USER: javos_user
  #     MYSQL_PASSWORD: ${MYSQL_PASSWORD:-javos_password}
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - javos-mysql-data:/var/lib/mysql
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  javos-data:
    driver: local
  # javos-mysql-data:
  #   driver: local

