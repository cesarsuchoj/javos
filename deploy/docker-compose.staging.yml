# ============================================================
# Javos - Docker Compose (Staging)
# ============================================================
# Configuração para ambiente de staging/homologação:
#   - Imagem produzida pelo CI (ou build local)
#   - nginx como reverse proxy (HTTPS com certificado autoassinado)
#   - Backend Spring Boot (API)
#   - Prometheus + Grafana para monitoramento
#   - Health checks idênticos ao ambiente de produção
#
# Diferenças em relação à produção:
#   - Certificado SSL autoassinado (em vez de Let's Encrypt)
#   - Perfil Spring "staging" com logs mais verbosos
#   - Grafana exposto na porta 3001 (para não conflitar com prod)
#   - Variáveis STAGING_* para isolar dados do banco
#
# PRÉ-REQUISITO:
#   cp .env.staging.example .env.staging
#   # edite .env.staging com os valores do ambiente
#   ./init-ssl.sh          # gera certificado autoassinado
#   docker compose -f docker-compose.staging.yml --env-file .env.staging up -d
# ============================================================

version: '3.9'

services:

  # ---- Backend Spring Boot (API) ----
  backend:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: production
    image: ${DOCKER_IMAGE:-javos:staging}
    container_name: javos-staging-backend
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET obrigatório — defina no arquivo .env.staging}
      JWT_REFRESH_TOKEN_EXPIRY_DAYS: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:-7}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-staging}
      # Banco de dados
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:sqlite:./data/javos-staging.db}
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:-org.sqlite.JDBC}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-}
      SPRING_JPA_DATABASE_PLATFORM: ${SPRING_JPA_DATABASE_PLATFORM:-org.hibernate.community.dialect.SQLiteDialect}
      # CORS — aceita apenas o domínio de staging
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?CORS_ALLOWED_ORIGINS obrigatório — defina no arquivo .env.staging}
      # Rate limiting
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
    volumes:
      - javos-staging-data:/app/data
    networks:
      - javos-staging-internal
      - javos-staging-monitoring
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "javos-staging-backend"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ---- nginx: reverse proxy + frontend estático + SSL ----
  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: nginx-frontend
    image: ${DOCKER_IMAGE_NGINX:-javos-nginx:staging}
    container_name: javos-staging-nginx
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      # Certificados SSL (gerados por ./init-ssl.sh)
      - ./ssl:/etc/nginx/ssl:ro
      # Diretório para ACME challenge (Let's Encrypt opcional em staging)
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - javos-staging-internal
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
        tag: "javos-staging-nginx"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---- Prometheus: coleta de métricas ----
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: javos-staging-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-7d}"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus-staging-data:/prometheus
    networks:
      - javos-staging-monitoring
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "javos-staging-prometheus"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ---- Grafana: visualização de métricas ----
  grafana:
    image: grafana/grafana-oss:11.6.1
    container_name: javos-staging-grafana
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD obrigatório — defina no .env.staging}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-http://localhost:3001}
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_ANALYTICS_CHECK_FOR_UPDATES: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-staging-data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - javos-staging-monitoring
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
        tag: "javos-staging-grafana"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  javos-staging-internal:
    driver: bridge
  javos-staging-monitoring:
    driver: bridge

volumes:
  javos-staging-data:
    driver: local
  prometheus-staging-data:
    driver: local
  grafana-staging-data:
    driver: local
