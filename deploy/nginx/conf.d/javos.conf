# ============================================================
# Javos - Configuração de servidor nginx
# ============================================================
# HTTP: redireciona para HTTPS + serve ACME challenge
# HTTPS: reverse proxy + frontend estático + SSL/TLS
# ============================================================

# ----------------------------------------------------------
# HTTP → HTTPS (redirect)
# Também serve o ACME challenge para renovação Let's Encrypt
# ----------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Health check do nginx (usado pelo Docker healthcheck)
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # ACME challenge (Let's Encrypt / certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redireciona todo o resto para HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ----------------------------------------------------------
# HTTPS - Servidor principal
# ----------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name _;

    # ----------------------------------------------------------
    # Certificados SSL
    # Montar via docker-compose: ./ssl:/etc/nginx/ssl:ro
    # Gerar com: ./init-ssl.sh
    # ----------------------------------------------------------
    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    # Protocolos e cifras modernos (Mozilla Intermediate)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ----------------------------------------------------------
    # Cabeçalhos de segurança
    # ----------------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------
    # Frontend estático (SPA React)
    # ----------------------------------------------------------
    root /usr/share/nginx/html;
    index index.html;

    # Health check do nginx (não proxeado ao backend)
    location = /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }

    # Assets estáticos com cache longo (hash no nome do arquivo pelo Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|map|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA routing: retorna index.html para rotas não encontradas
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ----------------------------------------------------------
    # Proxy para o backend (API)
    # ----------------------------------------------------------
    location /api/ {
        proxy_pass http://backend:8080;
    }

    # Documentação da API (Swagger)
    location /swagger-ui {
        proxy_pass http://backend:8080;
    }

    location /api/docs {
        proxy_pass http://backend:8080;
    }

    location /v3/api-docs {
        proxy_pass http://backend:8080;
    }

    # Actuator health (público)
    location = /actuator/health {
        proxy_pass http://backend:8080;
    }

    # Actuator completo (protegido pelo backend via ROLE_ADMIN)
    location /actuator/ {
        proxy_pass http://backend:8080;
    }
}
