# ============================================================
# Javos - Configuração da Aplicação
# ============================================================
# Banco de dados padrão: SQLite (configurável via variáveis de
# ambiente). Para trocar de banco, edite o arquivo .env na
# pasta deploy/ e reinicie a aplicação.
# ============================================================

spring:
  application:
    name: javos

  # ----------------------------------------------------------
  # Banco de Dados
  # Padrão: SQLite  |  Alternativa: MySQL (via variáveis de ambiente)
  # ----------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:./data/javos.db}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.community.dialect.SQLiteDialect}
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ----------------------------------------------------------
  # Flyway - Migrations
  # ----------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ----------------------------------------------------------
# Segurança JWT
# ----------------------------------------------------------
javos:
  jwt:
    secret: ${JWT_SECRET:javos-default-secret-key-change-in-production-must-be-at-least-256-bits}
    expiration-ms: 86400000  # 24 horas
    refresh-token-expiry-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:7}  # 7 dias

# ----------------------------------------------------------
# Servidor
# ----------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}

# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------
logging:
  level:
    com.javos: INFO
    com.javos.config: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

# ----------------------------------------------------------
# Actuator - Métricas e Monitoramento
# ----------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

# ----------------------------------------------------------
# SpringDoc / Swagger UI
# ----------------------------------------------------------
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html
