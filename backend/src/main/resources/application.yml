# ============================================================
# Javos - Configuração da Aplicação
# ============================================================
# Banco de dados padrão: SQLite (configurável via variáveis de
# ambiente). Para trocar de banco, edite o arquivo .env na
# pasta deploy/ e reinicie a aplicação.
# ============================================================

spring:
  application:
    name: javos

  # ----------------------------------------------------------
  # Banco de Dados
  # Padrão: SQLite  |  Alternativa: MySQL (via variáveis de ambiente)
  # ----------------------------------------------------------
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:sqlite:./data/javos.db}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.sqlite.JDBC}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}

  jpa:
    database-platform: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.community.dialect.SQLiteDialect}
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  # ----------------------------------------------------------
  # Flyway - Migrations
  # ----------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ----------------------------------------------------------
# Segurança JWT / CORS / Rate Limiting
# ----------------------------------------------------------
javos:
  jwt:
    secret: ${JWT_SECRET:javos-default-secret-key-change-in-production-must-be-at-least-256-bits}
    expiration-ms: 86400000  # 24 horas
    refresh-token-expiry-days: ${JWT_REFRESH_TOKEN_EXPIRY_DAYS:7}  # 7 dias

  # CORS – use CORS_ALLOWED_ORIGINS=https://app.example.com in production
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
    allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
    allowed-headers: ${CORS_ALLOWED_HEADERS:*}
    exposed-headers: X-Correlation-Id,X-API-Version,Deprecation,Sunset,Warning
    max-age: ${CORS_MAX_AGE:3600}

  # API versioning – path-based strategy (/api/v1/...)
  # To soft-deprecate a version, add it to deprecated-versions with an optional sunset date.
  # Example:
  #   deprecated-versions:
  #     v1:
  #       sunset-date: "2026-12-31"
  #       message: "Please migrate to /api/v2/."
  api:
    current-version: v1
    deprecated-versions: {}

  # Rate limiting (token-bucket, per client IP)
  rate-limit:
    enabled: ${RATE_LIMIT_ENABLED:true}
    # General API: 100 requests / 60 s per IP
    api-capacity: ${RATE_LIMIT_API_CAPACITY:100}
    api-refill-tokens: ${RATE_LIMIT_API_REFILL_TOKENS:100}
    api-refill-duration-seconds: ${RATE_LIMIT_API_REFILL_DURATION_SECONDS:60}
    # Auth endpoints: 10 requests / 60 s per IP (brute-force protection)
    auth-capacity: ${RATE_LIMIT_AUTH_CAPACITY:10}
    auth-refill-tokens: ${RATE_LIMIT_AUTH_REFILL_TOKENS:10}
    auth-refill-duration-seconds: ${RATE_LIMIT_AUTH_REFILL_DURATION_SECONDS:60}

# ----------------------------------------------------------
# Servidor
# ----------------------------------------------------------
server:
  port: ${SERVER_PORT:8080}

# ----------------------------------------------------------
# Logging
# ----------------------------------------------------------
logging:
  level:
    com.javos: INFO
    com.javos.config: WARN
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.hibernate: WARN
    org.flywaydb: INFO

# ----------------------------------------------------------
# Actuator - Métricas e Monitoramento
# ----------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    # Habilita histogramas de percentis para latência HTTP (p50, p95, p99)
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 100ms, 500ms, 1s

# ----------------------------------------------------------
# SpringDoc / Swagger UI
# ----------------------------------------------------------
springdoc:
  api-docs:
    path: /api/docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
    display-request-duration: true
    try-it-out-enabled: true
